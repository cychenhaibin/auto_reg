name: Publish Docker image (main)

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: auto-reg-docker-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Normalize image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Resolve image tag
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            IMAGE_TAG="latest"
          else
            BRANCH_TAG_SOURCE="${GITHUB_REF_NAME}"
            IMAGE_TAG=$(printf '%s' "${BRANCH_TAG_SOURCE}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^[.-]+//; s/[.-]+$//; s/-+/-/g')
            IMAGE_TAG=${IMAGE_TAG:0:120}
            IMAGE_TAG=$(printf '%s' "$IMAGE_TAG" | sed -E 's/[.-]+$//')
            if [ -z "$IMAGE_TAG" ]; then
              IMAGE_TAG="branch-${GITHUB_SHA::12}"
            fi
          fi
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
